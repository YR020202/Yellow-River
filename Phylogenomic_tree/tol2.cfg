# Configuration file for phylogenetic analysis pipeline (e.g., PhyloPhlAn)
# Defines executable paths and command-line parameters for each step:
# database creation, read mapping (DNA/AA), multiple sequence alignment, trimming, and tree inference

# ============================================
# [db_aa] : Build a DIAMOND database from amino acid sequences
# ============================================
# This section defines how to create a DIAMOND-formatted reference database from protein sequences
[db_aa]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/diamond
params = makedb                    # DIAMOND subcommand to build a database
threads = --threads                # Specify the number of CPU threads for parallel processing
input = --in                       # Input FASTA file containing protein sequences
output = --db                      # Output database file name (DIAMOND format)
version = version                  # Command to obtain the software version
command_line = #program_name# #params# #threads# #input# #output#

# ============================================
# [map_dna] : Map DNA query sequences (nucleotides) to a DIAMOND protein database using blastx
# ============================================
# Translates query DNA sequences in all six frames and aligns them against a protein reference database
[map_dna]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/diamond
params = blastx --quiet --threads 1 --outfmt 6 --more-sensitive --id 50 --max-hsps 35 -k 0 --query-gencode 11
# --quiet                     : Suppress verbose output
# --threads 1                 : Use a single CPU thread (adjustable)
# --outfmt 6                  : Output format = tab-separated BLAST-like table
# --more-sensitive            : Higher sensitivity for short or divergent sequences
# --id 50                     : Minimum percent identity threshold (50%)
# --max-hsps 35               : Maximum number of high-scoring segment pairs (HSPs) per query
# -k 0                        : Report all matches above the E-value threshold
# --query-gencode 11          : Genetic code for translation (11 = bacterial/archaeal code)
input = --query                # Input FASTA file (nucleotide sequences)
database = --db                # DIAMOND protein database
output = --out                 # Output file (BLAST tabular format)
version = version
command_line = #program_name# #params# #input# #database# #output#

# ============================================
# [map_aa] : Map protein query sequences to a DIAMOND protein database using blastp
# ============================================
# Aligns amino acid query sequences directly against a protein reference database
[map_aa]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/diamond
params = blastp --quiet --threads 1 --outfmt 6 --more-sensitive --id 50 --max-hsps 35 -k 0
# --quiet, --threads, --outfmt, --more-sensitive, --id, --max-hsps, -k : same as blastx above
input = --query                # Input FASTA file (protein sequences)
database = --db                # DIAMOND protein database
output = --out                 # Output file (BLAST tabular format)
version = version
command_line = #program_name# #params# #input# #database# #output#

# ============================================
# [msa] : Multiple sequence alignment using MAFFT
# ============================================
# Performs automatic alignment of protein or nucleotide sequences
[msa]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/mafft
params = --quiet --anysymbol --thread 1 --auto
# --quiet               : Suppress progress output
# --anysymbol           : Accept any symbol (e.g., ambiguous characters, stop codons)
# --thread 1            : Use a single CPU thread (adjustable)
# --auto                : Automatically select the optimal alignment strategy based on data size
version = --version              # Command to obtain MAFFT version
command_line = #program_name# #params# #input# > #output#
environment = TMPDIR=/tmp        # Temporary directory for intermediate files

# ============================================
# [trim] : Trim poorly aligned regions from the MSA using trimAl
# ============================================
# Removes columns with gaps in a substantial proportion of sequences (gappyout method)
[trim]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/trimal
params = -gappyout                # Remove positions with gap fraction > 0.5 (automatically determined)
input = -in                       # Input multiple sequence alignment (e.g., in FASTA or Clustal format)
output = -out                     # Output trimmed alignment
version = --version
command_line = #program_name# #params# #input# #output#

# ============================================
# [tree1] : Phylogenetic tree inference using IQ-TREE
# ============================================
# Constructs a maximum-likelihood tree using the LG substitution model (appropriate for proteins)
[tree1]
program_name = /home/metagenomes/miniconda3/envs/phylophlan/bin/iqtree
params = -quiet -nt AUTO -m LG
# -quiet            : Suppress log messages except errors
# -nt AUTO          : Automatically determine the number of CPU threads
# -m LG             : Use the LG model of amino acid substitution (recommended for proteins)
input = -s                        # Input multiple sequence alignment (FASTA or PHYLIP format)
output = -pre                     # Prefix for output files (tree, log, etc.)
version = -version
command_line = #program_name# #params# #input# #output#